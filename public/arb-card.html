<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Business Card</title>
  <!-- A-Frame and MindAR Scripts -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <!-- MindAR Image Tracking Context Setup -->
  <a-scene
    mindar-image="imageTargetSrc: /targets/targets_combined.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10;"
    color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- Assets to preload for AR Scene -->
    <a-assets>
      <img id="card" src="/Images/Polito_upscale%20(1).jpg" crossorigin="anonymous" />
      <a-asset-item id="boyModel"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF-Binary/CesiumMan.glb"
        crossorigin="anonymous"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: Set rotation to 0 0 0 so everything matches the target exactly -->
    <a-entity mindar-image-target="targetIndex: 0" rotation="0 0 0">

      <!-- Card image plane: width=1, height=1.5 to match original 4096×6144 (2:3) resolution -->
      <!-- No rotation on X, meaning it overlays flat on top of the original physical marker. -->
      <a-plane src="#card" position="0 0 0" height="1.5" width="1" rotation="0 0 0" material="side: double"></a-plane>

      <!-- Boy model standing on the card (base at Z=0.1 to sit slightly on top of the card) -->
      <!-- Rotating it 90 degrees on the X axis so the boy stands UP out of the card. -->
      <a-gltf-model rotation="90 0 0" position="0 -0.4 0.1" scale="0.4 0.4 0.4" src="#boyModel"></a-gltf-model>
    </a-entity>

  </a-scene>
</body>

</html>
