<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Business Card</title>
  <!-- A-Frame and MindAR Scripts -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: /targets/targets%20(6).mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 10;"
    color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="cardOverlay" src="/Images/Polito_upscale%20(1).jpg" crossorigin="anonymous" />
      <a-asset-item id="boyModel"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMan/glTF-Binary/CesiumMan.glb"
        crossorigin="anonymous"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 1 & 0: Character standing on card with backdrop -->
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- 
        Standing character: 
        Rotation 90 0 0 makes him stand UP out of the card.
        Positioned towards the front of the marker.
      -->
      <a-gltf-model rotation="90 0 0" position="0 -0.4 0.1" scale="0.4 0.4 0.4" src="#boyModel"></a-gltf-model>

      <!-- 
        Standing backdrop:
        Rotation 90 0 0 makes it a vertical wall.
        Position 0 0.5 0.75 moves it BEHIND the model (relative to Z-up out of card)
        and lifts it so it stands on the marker.
      -->
      <a-plane src="#cardOverlay" position="0 0.5 0.75" height="1.5" width="1" rotation="90 0 0"
        material="side: double"></a-plane>
    </a-entity>

  </a-scene>
</body>

</html>
